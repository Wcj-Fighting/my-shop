<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>商品管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0f0f0f;
            --secondary-bg: #1a1a1a;
            --accent-gold: #d4af37;
            --accent-light: #e8dcc8;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #51cf66;
            --error: #ff6b6b;
            --warning: #ffd43b;
        }

        body {
            background: linear-gradient(135deg, var(--primary-bg) 0%, #1a1a2e 100%);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--accent-light);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 配置区 */
        .config-section {
            background: var(--secondary-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .config-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: var(--accent-gold);
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .price-input {
            display: flex;
            align-items: baseline;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding-left: 12px;
            transition: border-color 0.3s;
        }

        .price-input:focus-within {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .price-currency {
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
        }

        .form-group .price-input input,
        .form-group .price-input input:focus {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: 0;
            padding: 12px 14px 12px 0;
            font-size: 16px;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--primary-bg);
        }

        .btn-primary:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(212, 175, 55, 0.2);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        .btn-danger {
            background: var(--error);
            color: white;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-success {
            background: var(--success);
            color: var(--primary-bg);
        }

        .btn-success:hover {
            background: #40c057;
        }

        /* 状态提示 */
        .status-message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(81, 207, 102, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-message.error {
            background: rgba(255, 107, 107, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .status-message.loading {
            background: rgba(212, 175, 55, 0.2);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        /* 商品管理区 */
        .products-section {
            background: var(--secondary-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .products-section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--accent-gold);
        }

        .product-search {
            margin-bottom: 18px;
        }

        .product-search input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
        }

        .product-search input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.08);
        }

        /* 商品列表 */
        .products-list {
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .product-item {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr) minmax(160px, 1fr);
            gap: 14px;
            align-items: center;
            min-height: 96px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .product-item img {
            width: 72px;
            height: 72px;
            border-radius: 4px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
        }

        .product-item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .product-item-name {
            font-size: 18px;
            color: var(--text-primary);
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-item-price {
            font-size: 16px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .product-item-id {
            display: none;
        }

        .product-item-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            justify-self: stretch;
        }

        .product-item-actions button {
            min-height: 44px;
            padding: 8px 10px;
            font-size: 16px;
            font-weight: 700;
        }

        /* 表单区 */
        .form-section {
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 20px;
        }

        .form-section h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--accent-light);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .preview-image {
            width: 100px;
            height: 100px;
            border-radius: 6px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin: 8px auto 12px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .form-section .btn-primary,
        .form-section .btn-secondary,
        .save-server-button {
            min-height: 44px;
            padding: 8px 14px;
            font-size: 16px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .config-grid {
                grid-template-columns: 1fr;
            }

            .product-item {
                grid-template-columns: 64px minmax(0, 1fr) minmax(116px, 1fr);
                gap: 8px;
                min-height: 88px;
                padding: 10px;
            }

            .product-item img {
                width: 64px;
                height: 64px;
            }

            .product-item-actions {
                gap: 8px;
            }

            .product-item-actions button {
                min-height: 42px;
                padding: 8px 6px;
                font-size: 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>商品管理后台<span id="modeTag" style="display:inline-block;margin-left:8px;padding:2px 8px;border-radius:4px;background:#888;color:#fff;font-size:12px;vertical-align:middle">github mode</span></h1>
        </div>

        <!-- 配置区 -->
        <div class="config-section">
            <h2>密码</h2>
            <div class="form-group" style="margin-bottom: 16px;">
                <input type="password" id="githubToken" aria-label="密码" placeholder="请输入密码保存">
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="saveConfig()">保存密码</button>
                <button class="btn-secondary" onclick="clearConfig()">清除密码</button>
            </div>
            <div id="configStatus" class="status-message"></div>
        </div>

        <!-- 商品管理区 -->
        <div class="products-section">
            <h2>商品管理</h2>
            <div class="product-search">
                <input type="search" id="productSearch" placeholder="搜索商品名称">
            </div>
            <div id="productsStatus" class="status-message"></div>

            <!-- 商品列表 -->
            <div id="productsList" class="products-list"></div>

            <!-- 添加/编辑表单 -->
            <div class="form-section">
                <h3 id="formTitle">添加新商品</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>商品名称</label>
                        <input type="text" id="productName" placeholder="例：高级手表">
                    </div>
                    <div class="form-group">
                        <label>价格</label>
                        <div class="price-input">
                            <span class="price-currency">¥</span>
                            <input type="text" id="productPrice" inputmode="decimal" placeholder="例：2,899">
                        </div>
                    </div>
                </div>
                <div class="form-row full">
                    <div class="form-group">
                        <label>商品图片</label>
                        <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="handleImageUpload(this.files[0])">
                        <img id="imagePreview" class="preview-image" style="display: none;">
                        <button type="button" class="btn-secondary" onclick="document.getElementById('imageFile').click()" style="margin-bottom: 8px;">📷 拍照 / 从相册选择</button>
                        <input type="hidden" id="productImage" oninput="previewImage()">
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-primary" onclick="saveProduct()">保存商品</button>
                    <button class="btn-secondary" onclick="resetForm()">取消编辑</button>
                </div>
            </div>

            <!-- 持久化保存 -->
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
                <div style="font-size: 18px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.45;">
                    <strong style="color: var(--accent-gold);">商品内容编辑完一定要记得点击下方保存到服务器！！</strong>
                </div>
                <button class="btn-success save-server-button" onclick="saveToGitHub()" style="width: 100%; margin-bottom: 10px;">保存到服务器</button>
            </div>
        </div>
    </div>

    <script>
        // 写死的仓库配置（公开信息，可安全硬编码）
        const GITHUB_USERNAME = 'Wcj-Fighting';
        const GITHUB_REPO = 'my-shop';

        let products = [];
        let editingId = null;
        // dev server detection: if /api/health responds within 1s, use local mode
        window.__SHOP_MODE__ = 'github';
        window.__SHOP_AUTO_SYNC__ = false;
        (async () => {
          try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 1000);
            const res = await fetch('/api/health', { signal: ctrl.signal, cache: 'no-store' });
            clearTimeout(timer);
            if (res.ok) {
              const data = await res.json();
              window.__SHOP_MODE__ = 'local';
              window.__SHOP_AUTO_SYNC__ = !!data.autoSync;
              const tag = document.getElementById('modeTag');
              if (tag) {
                tag.textContent = data.autoSync ? 'local mode (sync)' : 'local mode (no sync)';
                tag.style.background = '#0a7d2c';
              }
            }
          } catch { /* keep github mode */ }
        })();
        let pendingImageBlob = null;
        let productSearchQuery = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            loadProducts();
            document.getElementById('productSearch').addEventListener('input', (event) => {
                productSearchQuery = event.target.value.trim().toLowerCase();
                renderProductsList();
            });
        });

        // 保存配置
        function saveConfig() {
            const token = document.getElementById('githubToken').value.trim();

            if (!token) {
                showStatus('configStatus', '请填写密码', 'error');
                return;
            }

            localStorage.setItem('github_token', token);
            showStatus('configStatus', '✓ 密码已保存（仅保存在本浏览器）', 'success');
        }

        // 加载配置
        function loadConfig() {
            const token = localStorage.getItem('github_token') || '';
            document.getElementById('githubToken').value = token;
        }

        // 清除配置
        function clearConfig() {
            if (confirm('确定要清除密码吗？')) {
                localStorage.removeItem('github_token');
                document.getElementById('githubToken').value = '';
                showStatus('configStatus', '✓ 密码已清除', 'success');
            }
        }

        // 加载商品
        async function loadProducts() {
            try {
                const response = await fetch(`products.json?t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) throw new Error('Failed to load products');
                const data = await response.json();
                products = data.products || [];
                renderProductsList();
            } catch (error) {
                console.error('Error loading products:', error);
                showStatus('productsStatus', '加载商品失败', 'error');
            }
        }

        // 渲染商品列表
        function renderProductsList() {
            const list = document.getElementById('productsList');
            if (products.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无商品，添加第一个商品吧</p></div>';
                return;
            }

            const visibleProducts = productSearchQuery
                ? products.filter(product => String(product.name || '').toLowerCase().includes(productSearchQuery))
                : products;

            if (visibleProducts.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>没有找到匹配的商品</p></div>';
                return;
            }

            list.innerHTML = visibleProducts.map(product => `
                <div class="product-item">
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%231a1a1a%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
                    <div class="product-item-info">
                        <div class="product-item-name">${product.name}</div>
                        <div class="product-item-price">${product.price}</div>
                    </div>
                    <div class="product-item-id">ID: ${product.id}</div>
                    <div class="product-item-actions">
                        <button class="btn-secondary" onclick="editProduct(${product.id})">编辑</button>
                        <button class="btn-danger" onclick="deleteProduct(${product.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function stripPriceCurrency(price) {
            return String(price || '').replace(/^[\s¥￥]+/, '').trim();
        }

        function formatPrice(price) {
            const value = stripPriceCurrency(price);
            return value ? `¥${value}` : '';
        }

        // 编辑商品
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            clearPendingImage();
            editingId = id;
            document.getElementById('formTitle').textContent = '编辑商品';
            document.getElementById('productName').value = product.name;
            document.getElementById('productPrice').value = stripPriceCurrency(product.price);
            document.getElementById('productImage').value = product.image;
            previewImage();
            window.scrollTo({ top: document.querySelector('.form-section').offsetTop - 100, behavior: 'smooth' });
        }

        // 删除商品
        function deleteProduct(id) {
            if (confirm('确定要删除这个商品吗？')) {
                products = products.filter(p => p.id !== id);
                renderProductsList();
                showStatus('productsStatus', '✓ 商品已删除（未保存到 GitHub）', 'success');
            }
        }

        // 保存商品
        async function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            const priceInput = document.getElementById('productPrice').value.trim();
            const price = formatPrice(priceInput);
            let image = document.getElementById('productImage').value.trim();

            if (!name || !priceInput) {
                showStatus('productsStatus', '请填写名称和价格', 'error');
                return;
            }

            if (!image && !pendingImageBlob) {
                showStatus('productsStatus', '请上传图片或填写图片 URL', 'error');
                return;
            }

            // 有待上传图片时，先上传到 GitHub 取得 URL
            if (pendingImageBlob) {
                const token = (localStorage.getItem('github_token') || '').trim();

                try {
                    const sizeKB = Math.round(pendingImageBlob.size / 1024);
                    showStatus('productsStatus', `正在上传图片（${sizeKB} KB）...`, 'loading');
                    if (window.__SHOP_MODE__ === 'local') {
                        image = await uploadImageToLocal(pendingImageBlob);
                    } else {
                        if (!token) {
                            showStatus('productsStatus', '请先保存密码', 'error');
                            return;
                        }
                        image = await uploadImageToGitHub(pendingImageBlob, GITHUB_USERNAME, GITHUB_REPO, token);
                    }
                    clearPendingImage();
                } catch (error) {
                    console.error('Upload failed:', error);
                    showStatus('productsStatus', `图片上传失败：${error.message}`, 'error');
                    return;
                }
            }

            if (editingId) {
                const product = products.find(p => p.id === editingId);
                if (product) {
                    product.name = name;
                    product.price = price;
                    product.image = image;
                    showStatus('productsStatus', '✓ 商品已更新，别忘了点"保存到 GitHub"', 'success');
                }
                editingId = null;
            } else {
                const newId = Math.max(...products.map(p => p.id), 0) + 1;
                products.push({ id: newId, name, price, image });
                showStatus('productsStatus', '✓ 商品已添加，别忘了点"保存到 GitHub"', 'success');
            }

            resetForm();
            renderProductsList();
        }

        // 重置表单
        function resetForm() {
            editingId = null;
            clearPendingImage();
            document.getElementById('formTitle').textContent = '添加新商品';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }

        // 预览图片（URL 输入）
        function previewImage() {
            const url = document.getElementById('productImage').value.trim();
            const preview = document.getElementById('imagePreview');
            if (url) {
                clearPendingImage();
                preview.src = url;
                preview.style.display = 'block';
                preview.onerror = () => {
                    preview.style.display = 'none';
                };
            } else if (!pendingImageBlob) {
                preview.style.display = 'none';
            }
        }

        // 处理图片选择（只压缩 + 预览，不上传 — 点"保存商品"时才上传）
        async function handleImageUpload(file) {
            if (!file) return;
            try {
                showStatus('productsStatus', '正在处理图片...', 'loading');
                const compressed = await compressImage(file, 800, 0.85);
                clearPendingImage();
                pendingImageBlob = compressed;

                // 用本地 blob URL 展示预览
                const preview = document.getElementById('imagePreview');
                preview.src = URL.createObjectURL(compressed);
                preview.style.display = 'block';
                preview.onerror = null;

                // 清空 URL 输入框，避免冲突
                document.getElementById('productImage').value = '';

                const sizeKB = Math.round(compressed.size / 1024);
                showStatus('productsStatus', `✓ 图片已就绪（${sizeKB} KB），请确认预览并填写名称价格，然后点"保存商品"`, 'success');
            } catch (error) {
                console.error('Process failed:', error);
                showStatus('productsStatus', `图片处理失败：${error.message}`, 'error');
            } finally {
                document.getElementById('imageFile').value = '';
            }
        }

        // 清除待上传图片（释放 blob URL）
        function clearPendingImage() {
            if (pendingImageBlob) {
                const preview = document.getElementById('imagePreview');
                if (preview.src.startsWith('blob:')) {
                    URL.revokeObjectURL(preview.src);
                }
                pendingImageBlob = null;
            }
        }

        async function uploadImageToLocal(blob) {
          const fd = new FormData();
          const ext = (blob.type.split('/')[1] || 'bin').replace('jpeg', 'jpg');
          fd.append('file', blob, `upload.${ext}`);
          const res = await fetch('/api/upload', { method: 'POST', body: fd });
          if (!res.ok) {
            const err = await res.text();
            throw new Error(`upload failed: ${res.status} ${err.slice(0, 200)}`);
          }
          const data = await res.json();
          return data.url;
        }

        // 上传单张图片到 GitHub，返回 jsDelivr CDN URL（国内访问快且稳定）
        async function uploadImageToGitHub(blob, username, repo, token) {
            const base64 = await blobToBase64(blob);
            const filename = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
            const path = `images/${filename}`;
            const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Upload image ${filename}`,
                    content: base64
                })
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`${response.status}: ${errText.slice(0, 200)}`);
            }

            const data = await response.json();
            return toJsdelivrUrl(data.content.download_url, username, repo);
        }

        // 把 GitHub raw URL 转成 jsDelivr CDN URL；非 raw URL 原样返回
        // 输入: https://raw.githubusercontent.com/{user}/{repo}/{branch}/{path}
        // 输出: https://cdn.jsdelivr.net/gh/{user}/{repo}@{branch}/{path}
        function toJsdelivrUrl(url, username, repo) {
            if (!url) return url;
            const rawPrefix = `https://raw.githubusercontent.com/${username}/${repo}/`;
            if (url.startsWith(rawPrefix)) {
                const rest = url.slice(rawPrefix.length); // {branch}/{path}
                const slashIdx = rest.indexOf('/');
                if (slashIdx > 0) {
                    const branch = rest.slice(0, slashIdx);
                    const path = rest.slice(slashIdx + 1);
                    return `https://cdn.jsdelivr.net/gh/${username}/${repo}@${branch}/${path}`;
                }
            }
            return url;
        }

        // 从 URL 提取 images/ 下的文件名（用于孤儿清理比对，兼容 raw 和 jsDelivr 两种格式）
        function extractImageFilename(url) {
            if (!url) return null;
            const match = url.match(/\/images\/([^/?#]+)/);
            return match ? match[1] : null;
        }

        // 压缩图片（最长边限制 + JPEG 质量）
        function compressImage(file, maxSize, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > height && width > maxSize) {
                            height = height * maxSize / width;
                            width = maxSize;
                        } else if (height > maxSize) {
                            width = width * maxSize / height;
                            height = maxSize;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob(
                            (blob) => blob ? resolve(blob) : reject(new Error('压缩失败')),
                            'image/jpeg',
                            quality
                        );
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        // Blob 转 base64（去掉 data: 前缀）
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = () => reject(new Error('Base64 编码失败'));
                reader.readAsDataURL(blob);
            });
        }

        // 保存到 GitHub
        async function saveToGitHub() {
            if (window.__SHOP_MODE__ === 'local') {
                showStatus('productsStatus', '正在保存（本地）...', 'loading');
                try {
                    const res = await fetch('/api/save-products', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ products })
                    });
                    if (!res.ok) {
                        const err = await res.text();
                        throw new Error(`${res.status} ${err.slice(0, 200)}`);
                    }
                    const data = await res.json();
                    const syncMsg = data.synced ? '，已 push 到 test 分支' : '（未同步到远端）';
                    showStatus('productsStatus', `✓ 已保存到本地${syncMsg}`, 'success');
                } catch (error) {
                    console.error('Local save failed:', error);
                    showStatus('productsStatus', `本地保存失败：${error.message}`, 'error');
                }
                return;
            }

            const token = (localStorage.getItem('github_token') || '').trim();

            if (!token) {
                showStatus('productsStatus', '请先保存密码', 'error');
                return;
            }

            showStatus('productsStatus', '正在保存...', 'loading');

            try {
                // 第一步：获取文件当前的 sha
                const getUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/products.json`;
                const getResponse = await fetch(getUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github+json'
                    }
                });

                if (!getResponse.ok) {
                    const errText = await getResponse.text();
                    console.error('GET failed:', getResponse.status, errText);
                    throw new Error(`GET ${getResponse.status}: ${errText.slice(0, 200)}`);
                }

                const fileData = await getResponse.json();
                const sha = fileData.sha;

                // 第二步：更新文件（UTF-8 安全的 Base64 编码，支持中文）
                const jsonString = JSON.stringify({ products }, null, 2);
                const content = btoa(unescape(encodeURIComponent(jsonString)));
                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update products via admin',
                        content: content,
                        sha: sha
                    })
                });

                if (!putResponse.ok) {
                    const errText = await putResponse.text();
                    console.error('PUT failed:', putResponse.status, errText);
                    throw new Error(`PUT ${putResponse.status}: ${errText.slice(0, 200)}`);
                }

                // 第三步：清理孤儿图片（仓库里 images/ 下没被任何商品引用的图）
                const cleanupCount = await cleanupOrphanImages(GITHUB_USERNAME, GITHUB_REPO, token);
                const cleanupMsg = cleanupCount > 0 ? `，清理了 ${cleanupCount} 张孤儿图片` : '';
                showStatus('productsStatus', `✓ 已成功保存到 GitHub${cleanupMsg}！约 1 分钟后刷新展示页可见更新`, 'success');
            } catch (error) {
                console.error('Error saving to GitHub:', error);
                showStatus('productsStatus', `保存失败：${error.message}`, 'error');
            }
        }

        // 一键把所有商品的老图片 URL（raw.githubusercontent.com）替换成 jsDelivr URL
        function migrateToJsdelivr() {
            const rawPrefix = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/`;
            let migrated = 0;

            for (const product of products) {
                if (product.image && product.image.startsWith(rawPrefix)) {
                    product.image = toJsdelivrUrl(product.image, GITHUB_USERNAME, GITHUB_REPO);
                    migrated++;
                }
            }

            if (migrated === 0) {
                showStatus('productsStatus', '没有需要迁移的图片（全都已经是 CDN URL 或外部 URL）', 'success');
                return;
            }

            renderProductsList();
            showStatus('productsStatus', `✓ 已将 ${migrated} 张图片切换到 CDN，记得点"保存到 GitHub"让访客看到`, 'success');
        }

        // 导出 JSON（本地测试用）
        function exportJson() {
            const json = JSON.stringify({ products }, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showStatus('productsStatus', '✓ 已下载 products.json，请替换项目根目录下的同名文件', 'success');
        }

        // 清理仓库 images/ 下没被引用的图片（按文件名比对，兼容 raw 和 jsDelivr 两种 URL）
        async function cleanupOrphanImages(username, repo, token) {
            const referenced = new Set(
                products.map(p => extractImageFilename(p.image)).filter(Boolean)
            );
            const listUrl = `https://api.github.com/repos/${username}/${repo}/contents/images`;

            let files;
            try {
                const res = await fetch(listUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github+json'
                    }
                });
                if (res.status === 404) return 0;
                if (!res.ok) {
                    console.warn('List images failed:', res.status);
                    return 0;
                }
                files = await res.json();
            } catch (e) {
                console.warn('List images error:', e);
                return 0;
            }

            if (!Array.isArray(files)) return 0;

            let deleted = 0;
            for (const file of files) {
                if (file.type !== 'file') continue;
                if (referenced.has(file.name)) continue;

                try {
                    const delRes = await fetch(
                        `https://api.github.com/repos/${username}/${repo}/contents/${file.path}`,
                        {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Accept': 'application/vnd.github+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Cleanup orphan image ${file.name}`,
                                sha: file.sha
                            })
                        }
                    );
                    if (delRes.ok) {
                        deleted++;
                    } else {
                        console.warn(`Delete ${file.path} failed:`, delRes.status);
                    }
                } catch (e) {
                    console.warn(`Delete ${file.path} error:`, e);
                }
            }
            return deleted;
        }

        // 显示状态信息
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status-message show ${type}`;
            if (type !== 'loading') {
                setTimeout(() => {
                    element.classList.remove('show');
                }, 4000);
            }
        }
    </script>
